version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: prime_links_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: prime_links_cache
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prime_links_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/prime_links
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeychangeinproduction123!
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prime_links_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
